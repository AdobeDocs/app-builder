<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Use Cases - Markdown Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d1117;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 45px;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 45px;
      background: #ffffff;
      border-radius: 8px;
    }
    @media (max-width: 767px) {
      .markdown-body {
        padding: 15px;
      }
    }
    .loading {
      color: #fff;
      text-align: center;
      padding: 50px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="markdown-body" id="content">
      <div class="loading">Loading markdown content...</div>
    </div>
  </div>
  
  <script type="module">
    import { marked } from 'https://esm.sh/marked@11.1.1';
    
    async function loadAndRenderMarkdown() {
      try {
        const response = await fetch('/resources/ai-use-cases.md');
        const markdown = await response.text();
        const html = marked.parse(markdown);
        document.getElementById('content').innerHTML = html;
      } catch (error) {
        document.getElementById('content').innerHTML = `<div style="color: red;">Error loading markdown: ${error.message}</div>`;
      }
    }
    
    loadAndRenderMarkdown();
  </script>
</body>
</html>
